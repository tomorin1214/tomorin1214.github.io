# ===== Navigation =====
nav:
  display_title: true
  display_post_title: true
  fixed: false

menu:
  Home: / || fas fa-home
  Archives: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open

social:
  fab fa-github: https://github.com/tomorin1214 || Github || '#24292e'

# ===== Avatar =====
avatar:
  img: /img/avatar.png?v=2
  effect: false

# ===== Images =====
favicon: /img/favicon.ico
disable_top_img: true
default_top_img:
index_img:
archive_img:
footer_img:

# Website Background
# Can set it to color, image URL or an array containing colors and/or image URLs
# If an array is provided, a random background will be selected from the array on each load
background: /img/bg.jpg

cover:
  index_enable: false
  aside_enable: false
  archives_enable: false
  default_cover: []

# ===== Theme Colors (Minimalist B&W) =====
theme_color:
  enable: true
  main: "#555555"
  paginator: "#333333"
  button_hover: "#222222"
  link_color: "#666666"
  hr_color: "#dddddd"
  code_foreground: "#333333"
  code_background: "rgba(0, 0, 0, .04)"
  toc_color: "#555555"
  blockquote_padding_color: "#888888"
  blockquote_background_color: "rgba(0, 0, 0, .03)"
  scrollbar_color: "#999999"

# ===== Code Blocks =====
code_blocks:
  theme: light
  macStyle: false
  height_limit: false
  copy: true
  language: true

# ===== Subtitle (打字机效果) =====
subtitle:
  enable: true
  effect: true
  source: false
  sub:
    - 记录生活，分享想法
    - 一个安静的角落
    - 写点东西，慢慢来

index_site_info_top:
index_top_img_height:

# ===== Post =====
post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: true
    label: true
  post:
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  enable: false

related_post:
  enable: true
  limit: 6

post_pagination: 1

# ===== Footer =====
footer:
  owner:
    enable: true
    since: 2026
  copyright:
    enable: true
    version: true
  custom_text: 记录生活 · 分享想法

# ===== Sidebar =====
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  card_author:
    enable: true
    description: 在夏日里生出的浮花的皎白、初更里的降雨
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/tomorin1214
  card_announcement:
    enable: true
    content: 欢迎来到我的小站 🎉
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
  card_archives:
    enable: true
    type: monthly
    order: -1
    limit: 8
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true

# ===== Search =====
search:
  use: local_search
  placeholder: 搜索文章...
  local_search:
    preload: true
    top_n_per_article: 1

# ===== Share =====
share:
  use: sharejs
  sharejs:
    sites: facebook,twitter,wechat,weibo,qq

# ===== Comments (需要你注册) =====
comments:
  use: Giscus
  text: true
  lazyload: false
  count: false

# Giscus
# https://giscus.app/
giscus:
  repo: tomorin1214/tomorin1214.github.io
  repo_id: R_kgDOTTKOmQ
  category: Announcements
  category_id: DIC_kwDOTTKOmc4DBUSR
  mapping: pathname
  reactions_enabled: true
  input_position: bottom
  lang: zh-CN
  light_theme: light
  dark_theme: dark

# ===== Effects =====
rounded_corners_ui: true
enter_transitions: true
readmode: true
darkmode:
  enable: true
  button: true
  autoChangeMode: 1

canvas_nest:
  enable: false

click_heart:
  enable: false

fireworks:
  enable: false

activate_power_mode:
  enable: false

# ===== Misc =====
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

rss: /atom.xml
Open_Graph_meta:
  enable: true
fontawesome: true
mask:
  header: true
  footer: true
css_prefix: true
display_mode: light
snackbar:
  enable: true
  position: bottom-left
instantpage: true
lazyload:
  enable: false
pjax:
  enable: true

# ===== Inject =====
inject:
  head:
    # 右侧边栏透明 + 文字阴影增强可读性 + 左侧文章区微透明
    - |
      <style>
        /* 右侧边栏 - 适中透明 */
        #aside-content .card-widget {
          background: rgba(255, 255, 255, 0.38) !important;
          backdrop-filter: blur(0px);
          -webkit-backdrop-filter: blur(0px);
        }
        /* 侧边栏文字 - 浅色阴影增强可读性 */
        #aside-content {
          text-shadow: 0 1px 2px rgba(255, 255, 255, 0.6);
        }
        /* 头像 - hover 进出各转 360 度 */
        .avatar-img {
          animation: none !important;
          transition: transform 0.8s ease;
        }
        .avatar-img:hover {
          transform: rotate(360deg);
        }
        .avatar-img img {
          border-radius: 50%;
        }
        /* 移动端侧边栏 - 适中透明 */
        #sidebar #sidebar-menus {
          background: rgba(255, 255, 255, 0.38) !important;
        }
        /* 左侧文章卡片 - 微透明 */
        #recent-posts .recent-post-item,
        #article-container .shuoshuo-item,
        .layout > div:first-child:not(.nc) {
          background: rgba(255, 255, 255, 0.92) !important;
        }
        /* Dark mode */
        [data-theme='dark'] #aside-content .card-widget {
          background: rgba(18, 18, 18, 0.38) !important;
        }
        [data-theme='dark'] #aside-content {
          text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
        }
        [data-theme='dark'] #sidebar #sidebar-menus {
          background: rgba(18, 18, 18, 0.38) !important;
        }
        [data-theme='dark'] #recent-posts .recent-post-item,
        [data-theme='dark'] #article-container .shuoshuo-item,
        [data-theme='dark'] .layout > div:first-child:not(.nc) {
          background: rgba(18, 18, 18, 0.92) !important;
        }
      </style>
  bottom:
